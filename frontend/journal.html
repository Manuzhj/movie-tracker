<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="JS.css">
    <title>Journal.MovieTracker</title>
</head>
<body>
    <div class="body">
        <a href="JS.html"><img src="logo.jpg" alt="logo" id="logo" width="80"></a>    
        <a href="#" id="sign-in-link">SIGN IN</a>

<!-- Hidden Sign-In Form -->
<div id="sign-in-form" class="hidden">
    <form>
        <h2>Sign In</h2>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>

        <a href="#" id="forgot-password">Forgot Password?</a>

        <button type="submit">Login</button>
        <button type="button" id="close-form">Close</button>
    </form>
</div>

        <a href="#" id="accountlink">CREATE ACCOUNT</a>
        <div id="overlay"></div>

<div id="accountform">
    <form>
        <h2>Create Account</h2>
        <label for="fullname">Full name</label><br>
        <input type="text" id="fullname" name="fullname" required><br><br>

        <label for="email">Email</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="password">Password</label><br>
        <input type="password" id="password" name="password" required><br><br>

        <label for="confirm">Confirm Password</label><br>
        <input type="password" id="confirm" name="confirm" required><br><br>

        <button type="submit">Sign up</button><br><br>
        <button id="closeform">Cancel</button>
    </form>
</div>
        <a href="films.html">FILMS</a>
        <a href="lists.html">LISTS</a>
        <a href="members.html">MEMBERS</a>
        <a href="journal.html">JOURNAL</a>
        <form id="search-form" role="search">
            <input type="search" id="query" name="q" placeholder="Search...">
            <button type="submit">🔍 <!-- Search icon --></button>
        </form>
</div>
<div class="journal-section">
    <h2>My Movie Journal</h2>
    <form id="journal-form">
        <label for="movie-title">Movie Title:</label><br>
        <input type="text" id="movie-title" name="movie-title" required><br><br>

        <label for="date-watched">Date Watched:</label><br>
        <input type="date" id="date-watched" name="date-watched" required><br><br>
        
        <label for="my-thoughts">Your Thoughts:</label><br>
        <textarea id="my-thoughts" name="my-thoughts" rows="4" required></textarea><br><br>
        
        <label for="rating">Rating (1-5):</label><br>
        <select id="rating" name="rating" required>
            <option value="">Select</option>
            <option value="1">1 ⭐</option>
            <option value="2">2 ⭐⭐</option>
            <option value="3">3 ⭐⭐⭐</option>
            <option value="4">4 ⭐⭐⭐⭐</option>
            <option value="5">5 ⭐⭐⭐⭐⭐</option>
        </select><br><br>
        
        <button type="submit">Add Entry</button>
    </form>
    <hr>
    <h3>Previous Entries</h3>
    <ul id="journal-entries">
        <!-- Entries will appear here -->
    </ul>
</div>
<script>
document.getElementById('journal-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const title = document.getElementById('movie-title').value;
    const date = document.getElementById('date-watched').value;
    const thoughts = document.getElementById('my-thoughts').value;
    const rating = document.getElementById('rating').value;
    const entry = document.createElement('li');
    entry.innerHTML = `<strong>${title}</strong> (${date})<br>
        <em>Rating:</em> ${'⭐'.repeat(rating)}<br>
        <em>Thoughts:</em> ${thoughts}`;
    document.getElementById('journal-entries').prepend(entry);
    this.reset();
});
</script>
<script src="JS.js"></script>

    <h3>About</h3>
    <h3>Contact:+254 758789099999</h3>
    <h3>Email:MovieTracker254@gmail.com</h3>
</footer>
</body>
</html>
